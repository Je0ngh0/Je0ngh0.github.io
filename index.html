<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               viewport-fit=cover"/>

<title>Precision Clock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

:root{
    --bg:#000;
    --white:#f5f5f7;
    --red:#ff453a;
    --green:#34c759;
    --gray:#8e8e93;
}

body{
    background:var(--bg);
    color:var(--white);
    width:100vw;
    min-height:100dvh;
    overflow:hidden;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:24px;

    padding:max(20px, env(safe-area-inset-top))
            max(20px, env(safe-area-inset-right))
            max(20px, env(safe-area-inset-bottom))
            max(20px, env(safe-area-inset-left));
}

.control-panel{
    width:34%;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.title{font-size:38px;font-weight:700;}
.version{color:var(--gray);font-size:16px;}
.label{font-size:18px;opacity:0.85;}

input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#1c1c1e;
    color:white;
    font-size:28px;
}

.preset-group{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.preset-group button{
    flex:1 1 45%;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:14px;
    background:#2c2c2e;
    color:white;
    cursor:pointer;
}

.button-group{
    display:flex;
    gap:14px;
}

button{
    flex:1;
    border:none;
    border-radius:18px;
    padding:18px;
    font-size:24px;
    color:white;
    cursor:pointer;
    transition:0.15s;
}

button:active{transform:scale(0.96);}

.start-btn{background:var(--green);}
.stop-btn{background:var(--red);}

.clock-area{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.clock-svg{
    width:min(76vw, 430px);
    height:min(76vw, 430px);
}

.clock-number{
    fill:white;
    font-size:22px;
    font-weight:700;
    text-anchor:middle;
    dominant-baseline:middle;
}

.digital{
    margin-top:24px;
    font-size:42px;
    font-weight:700;
    letter-spacing:3px;
}

@media (orientation: portrait){
    body{
        flex-direction:column;
        justify-content:flex-start;
        overflow:auto;
        gap:28px;
    }
    .control-panel{width:100%;}
    .clock-svg{width:min(92vw, 460px);height:min(92vw, 460px);}
    .digital{font-size:36px;}
}

</style>
</head>

<body>

<div class="control-panel">

    <div class="title">Precision Clock</div>
    <div class="version">Version 1.0.2</div>

    <div class="label">시작 시각 입력 (HH:MM:SS)</div>

    <input id="timeInput" value="12:00:00">

    <div class="preset-group">
        <button onclick="setPreset('10:10:00')">10:10</button>
        <button onclick="setPreset('10:55:00')">10:55</button>
        <button onclick="setPreset('11:03:00')">11:03</button>
        <button onclick="setPreset('11:15:00')">11:15</button>
        <button onclick="setPreset('11:40:00')">11:40</button>
    </div>

    <div class="button-group">
        <button class="start-btn" onclick="startClock()">시작</button>
        <button class="stop-btn" onclick="stopClock()">멈춤</button>
    </div>

</div>

<div class="clock-area">

<svg class="clock-svg" viewBox="0 0 500 500">

    <circle cx="250" cy="250" r="230"
            fill="#050505"
            stroke="white"
            stroke-width="10"/>

    <g id="ticks"></g>
    <g id="numbers"></g>

    <line id="hourHand" x1="250" y1="250" x2="250" y2="150"
          stroke="white" stroke-width="10" stroke-linecap="round"/>

    <line id="minuteHand" x1="250" y1="250" x2="250" y2="105"
          stroke="white" stroke-width="6" stroke-linecap="round"/>

    <line id="secondHand" x1="250" y1="270" x2="250" y2="80"
          stroke="#ff453a" stroke-width="3" stroke-linecap="round"/>

    <circle cx="250" cy="250" r="10" fill="white"/>

</svg>

<div class="digital" id="digitalTime">12:00:00</div>

</div>

<script>

/* ===== 상태 ===== */

let timer = null;
let baseTimestamp = null;
let baseTime = null;

/* ===== 프리셋 ===== */

function setPreset(t){
    document.getElementById("timeInput").value = t;
}

/* ===== 눈금 ===== */

const ticksGroup = document.getElementById("ticks");
const numbersGroup = document.getElementById("numbers");

for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180;
    const major=i%5===0;
    const r1=major?195:205, r2=220;

    const line=document.createElementNS("http://www.w3.org/2000/svg","line");

    line.setAttribute("x1",250+r1*Math.cos(a));
    line.setAttribute("y1",250+r1*Math.sin(a));
    line.setAttribute("x2",250+r2*Math.cos(a));
    line.setAttribute("y2",250+r2*Math.sin(a));

    line.setAttribute("stroke","white");
    line.setAttribute("stroke-width",major?4:2);
    line.setAttribute("opacity",major?1:0.5);

    ticksGroup.appendChild(line);
}

for(let i=1;i<=12;i++){
    const a=((i*30)-90)*Math.PI/180;
    const r=165;

    const text=document.createElementNS("http://www.w3.org/2000/svg","text");

    text.setAttribute("x",250+r*Math.cos(a));
    text.setAttribute("y",250+r*Math.sin(a));
    text.setAttribute("class","clock-number");
    text.textContent=i;

    numbersGroup.appendChild(text);
}

/* ===== 입력 파싱 ===== */

function parseInput(){
    const p=document.getElementById("timeInput").value.split(":");
    if(p.length!==3) return null;

    const h=+p[0], m=+p[1], s=+p[2];

    if(
        isNaN(h)||isNaN(m)||isNaN(s)||
        h<0||h>23||m<0||m>59||s<0||s>59
    ) return null;

    const d=new Date();
    d.setHours(h,m,s,0);
    return d;
}

/* ===== 핵심: 드리프트 없는 업데이트 ===== */

function updateClock(){

    if(!baseTimestamp || !baseTime) return;

    const now = Date.now();
    const diff = now - baseTimestamp;

    const current = new Date(baseTime.getTime() + diff);

    const h=current.getHours();
    const m=current.getMinutes();
    const s=current.getSeconds();

    const hourDeg=(h%12)*30+m*0.5;
    const minDeg=m*6+s*0.1;
    const secDeg=s*6;

    document.getElementById("hourHand")
        .setAttribute("transform",`rotate(${hourDeg} 250 250)`);

    document.getElementById("minuteHand")
        .setAttribute("transform",`rotate(${minDeg} 250 250)`);

    document.getElementById("secondHand")
        .setAttribute("transform",`rotate(${secDeg} 250 250)`);

    document.getElementById("digitalTime").innerText =
        `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

/* ===== 시작 ===== */

function startClock(){

    stopClock();

    const t=parseInput();
    if(!t){
        alert("시간 오류");
        return;
    }

    baseTime=t;
    baseTimestamp=Date.now();

    updateClock();

    timer=setInterval(updateClock,100);
}

/* ===== 멈춤 ===== */

function stopClock(){

    if(timer){
        clearInterval(timer);
        timer=null;
    }

    if(baseTimestamp && baseTime){

        const now=Date.now();
        const diff=now-baseTimestamp;

        const current=new Date(baseTime.getTime()+diff);

        document.getElementById("timeInput").value =
            `${String(current.getHours()).padStart(2,"0")}:`+
            `${String(current.getMinutes()).padStart(2,"0")}:`+
            `${String(current.getSeconds()).padStart(2,"0")}`;

        baseTime=current;
        baseTimestamp=null;
    }
}

/* 초기 */
updateClock();

</script>

</body>
</html>
