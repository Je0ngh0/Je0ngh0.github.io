<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>초침 시계</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
        background: #000;
        color: white;
        width: 100vw;
        height: 100vh;
        overflow: hidden;

        display: flex;
        flex-direction: row;

        justify-content: space-between;
        align-items: center;

        padding: 20px;
    }

    .left-panel {
        width: 32%;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .title {
        font-size: 28px;
        font-weight: bold;
    }

    .input-label {
        font-size: 18px;
        opacity: 0.8;
    }

    input {
        width: 100%;
        padding: 14px;
        font-size: 22px;
        border-radius: 16px;
        border: none;
        outline: none;
        background: #1c1c1e;
        color: white;
    }

    .button-group {
        display: flex;
        gap: 12px;
    }

    button {
        flex: 1;
        padding: 16px;
        font-size: 20px;
        border: none;
        border-radius: 16px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.96);
    }

    .start-btn {
        background: #34c759;
    }

    .stop-btn {
        background: #ff3b30;
    }

    .clock-area {
        width: 65%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .clock-wrapper {
        position: relative;
    }

    .clock {
        width: 320px;
        height: 320px;
        border: 8px solid white;
        border-radius: 50%;
        position: relative;
        background: #111;
    }

    .center-dot {
        width: 14px;
        height: 14px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
    }

    .hand {
        position: absolute;
        bottom: 50%;
        left: 50%;
        transform-origin: bottom center;
        transform: translateX(-50%) rotate(0deg);
        border-radius: 10px;
    }

    .second-hand {
        width: 3px;
        height: 130px;
        background: #ff453a;
    }

    .minute-hand {
        width: 5px;
        height: 110px;
        background: white;
    }

    .hour-hand {
        width: 8px;
        height: 80px;
        background: white;
    }

    .number {
        position: absolute;
        font-size: 22px;
        font-weight: bold;
        transform: translate(-50%, -50%);
    }

    .digital {
        margin-top: 25px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 2px;
    }
</style>
</head>

<body>

<div class="left-panel">
    <div class="title">초침 시계</div>

    <div class="input-label">
        시작 시각 입력 (예: 13:25:40)
    </div>

    <input type="text" id="timeInput" value="12:00:00">

    <div class="button-group">
        <button class="start-btn" onclick="startClock()">
            시작
        </button>

        <button class="stop-btn" onclick="stopClock()">
            멈춤
        </button>
    </div>
</div>

<div class="clock-area">
    <div class="clock-wrapper">

        <div class="clock" id="clock">

            <!-- 숫자 자동 생성 -->
            <script>
                for (let i = 1; i <= 12; i++) {

                    const angle = (i - 3) * 30 * Math.PI / 180;

                    const radius = 130;

                    const x = 160 + radius * Math.cos(angle);
                    const y = 160 + radius * Math.sin(angle);

                    document.write(`
                        <div class="number"
                             style="left:${x}px; top:${y}px;">
                             ${i}
                        </div>
                    `);
                }
            </script>

            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <div class="hand second-hand" id="secondHand"></div>

            <div class="center-dot"></div>

        </div>

        <div class="digital" id="digitalTime">
            12:00:00
        </div>

    </div>
</div>

<script>
    let timer = null;
    let currentTime = new Date();

    function setTimeFromInput() {

        const input = document.getElementById("timeInput").value;

        const parts = input.split(":");

        if (parts.length !== 3) {
            alert("HH:MM:SS 형식으로 입력하세요.");
            return false;
        }

        const h = parseInt(parts[0]);
        const m = parseInt(parts[1]);
        const s = parseInt(parts[2]);

        if (
            isNaN(h) || isNaN(m) || isNaN(s) ||
            h < 0 || h > 23 ||
            m < 0 || m > 59 ||
            s < 0 || s > 59
        ) {
            alert("올바른 시간을 입력하세요.");
            return false;
        }

        currentTime = new Date();

        currentTime.setHours(h);
        currentTime.setMinutes(m);
        currentTime.setSeconds(s);

        updateClock();

        return true;
    }

    function updateClock() {

        const hours = currentTime.getHours();
        const minutes = currentTime.getMinutes();
        const seconds = currentTime.getSeconds();

        const secondDeg = seconds * 6;
        const minuteDeg = minutes * 6 + seconds * 0.1;
        const hourDeg = (hours % 12) * 30 + minutes * 0.5;

        document.getElementById("secondHand").style.transform =
            `translateX(-50%) rotate(${secondDeg}deg)`;

        document.getElementById("minuteHand").style.transform =
            `translateX(-50%) rotate(${minuteDeg}deg)`;

        document.getElementById("hourHand").style.transform =
            `translateX(-50%) rotate(${hourDeg}deg)`;

        const hh = String(hours).padStart(2, "0");
        const mm = String(minutes).padStart(2, "0");
        const ss = String(seconds).padStart(2, "0");

        document.getElementById("digitalTime").innerText =
            `${hh}:${mm}:${ss}`;
    }

    function startClock() {

        stopClock();

        const ok = setTimeFromInput();

        if (!ok) return;

        timer = setInterval(() => {

            currentTime.setSeconds(
                currentTime.getSeconds() + 1
            );

            updateClock();

        }, 1000);
    }

    function stopClock() {

        if (timer) {
            clearInterval(timer);
            timer = null;
        }
    }

    updateClock();
</script>

</body>
</html>
